apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - external-secrets/externalsecret.yaml

helmCharts:
  - name: sso
    releaseName: dev-sso
    namespace: dev-sso
    repo: file://../../../charts
    version: 0.1.0
    valuesFile: sso-values-dev.yaml
    includeCRDs: false