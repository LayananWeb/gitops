apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lti-env-prod
  namespace: prod-lti
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: lti-env-prod
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: example/lti/prod/env