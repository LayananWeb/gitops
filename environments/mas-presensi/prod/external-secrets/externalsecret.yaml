apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: presensi-env
  namespace: prod-presensi
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: presensi-env-prod
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: mbugroup/mas-presensi/prod