apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sso-env-prod
  namespace: prod-sso
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: sso-env-prod
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: example/sso/prod/env