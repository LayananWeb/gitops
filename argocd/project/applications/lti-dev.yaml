apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lti-dev
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-lti

  sources:
    - repoURL: https://gitlab.com/cristian.anggita.parjaman/gitops.git
      targetRevision: main
      path: charts/lti
      helm:
        releaseName: dev-lti
        valueFiles:
          - $values/environments/lti/dev/lti-values-dev.yaml

    - repoURL: https://gitlab.com/cristian.anggita.parjaman/gitops.git
      targetRevision: main
      ref: values

    - repoURL: https://gitlab.com/cristian.anggita.parjaman/gitops.git
      targetRevision: main
      path: environments/lti/dev/external-secrets/
      directory:
        recurse: true

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true