apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sso-prod
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: prod-sso

  sources:
    - repoURL: https://gitlab.com/cristian.anggita.parjaman/gitops.git
      targetRevision: main
      path: charts/sso
      helm:
        releaseName: prod-sso
        valueFiles:
          - $values/environments/sso/prod/sso-values-prod.yaml

    - repoURL: https://gitlab.com/cristian.anggita.parjaman/gitops.git
      targetRevision: main
      ref: values

    - repoURL: https://gitlab.com/cristian.anggita.parjaman/gitops.git
      targetRevision: main
      path: environments/sso/prod/external-secrets
      directory:
        recurse: true

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true