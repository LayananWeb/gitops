{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mas-presensi.fullname" . }}-nginx
data:
  default.conf: |
    server {
      listen 8080;

      location = /healthz {
        return 200 "OK";
        add_header Content-Type text/plain;
      }

      location = /userinfo {
        return 307 /api/userinfo;
      }

      location = /auth/sign-in {
        return 307 /api/auth/sign-in;
      }

      location ^~ /auth/ {
        return 307 /api$request_uri;
      }

      location / {
        proxy_http_version 1.1;

        proxy_set_header Host             $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;

        # ✅ ambil proto dari ALB (jangan $scheme)
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Port  $http_x_forwarded_port;

        proxy_redirect off;
        proxy_pass http://127.0.0.1:{{ .Values.app.port | default 3000 }};
      }
    }
    {{- end }}