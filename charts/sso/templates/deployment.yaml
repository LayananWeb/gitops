apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sso.fullname" . }}
  labels:
    {{- include "sso.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sso.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sso.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}

      containers:
        - name: sso
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}

          ports:
            - name: http
              containerPort: 7001

          {{- if .Values.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.envFromSecret | quote }}
          {{- end }}

          {{- if and .Values.keys .Values.keys.enabled }}
          volumeMounts:
            - name: sso-jwt-keys
              mountPath: {{ .Values.keys.mountPath | default "/app/internal/config/keys" }}
              readOnly: true
          {{- end }}

          readinessProbe:
            tcpSocket:
              port: 7001
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 7001
            initialDelaySeconds: 15
            periodSeconds: 20

      {{- if and .Values.keys .Values.keys.enabled }}
      volumes:
        - name: sso-jwt-keys
          secret:
            secretName: {{ .Values.keys.secretName }}
      {{- end }}